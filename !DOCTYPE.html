<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 경제적 자유 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; background: #f4f7f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .result { margin-top: 25px; padding: 20px; background: #eff6ff; border-radius: 10px; border-left: 5px solid #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 FIRE 목표 시뮬레이터</h2>
        <div class="input-group">
            <label>현재 순자산 (만원)</label>
            <input type="number" id="currentAsset" value="10000">
        </div>
        <div class="input-group">
            <label>월 저축액 (만원)</label>
            <input type="number" id="monthlyInvest" value="300">
        </div>
        <div class="input-group">
            <label>연간 기대 수익률 (%)</label>
            <input type="number" id="annualReturn" value="8">
        </div>
        <div class="input-group">
            <label>은퇴 후 필요 월 생활비 (만원)</label>
            <input type="number" id="monthlySpend" value="400">
        </div>
        <button onclick="calculateFIRE()">나의 은퇴 시점 계산하기</button>

        <div id="resultArea" class="result" style="display:none;">
            <p id="targetText"></p>
            <h3 id="timeText"></h3>
            <canvas id="assetChart"></canvas>
        </div>
    </div>

    <script>
        let chart;
        function calculateFIRE() {
            const currentAsset = parseFloat(document.getElementById('currentAsset').value);
            const monthlyInvest = parseFloat(document.getElementById('monthlyInvest').value);
            const annualReturn = parseFloat(document.getElementById('annualReturn').value) / 100;
            const monthlySpend = parseFloat(document.getElementById('monthlySpend').value);
            
            const targetAsset = monthlySpend * 12 * 25; // 4% 법칙
            const monthlyReturn = annualReturn / 12;
            
            // 기간 계산 (NPER 로직)
            let months = 0;
            let balance = currentAsset;
            let dataPoints = [currentAsset];
            let labels = ['현재'];

            while (balance < targetAsset && months < 600) { // 최대 50년 제한
                balance = (balance * (1 + monthlyReturn)) + monthlyInvest;
                months++;
                if (months % 12 === 0) {
                    dataPoints.push(Math.round(balance));
                    labels.push((months/12) + '년후');
                }
            }

            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('targetText').innerText = `목표 자산: ${targetAsset.toLocaleString()}만 원`;
            document.getElementById('timeText').innerText = `예상 도달 기간: 약 ${Math.floor(months/12)}년 ${months%12}개월`;

            // 차트 업데이트
            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('assetChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: '자산 추이(만원)', data: dataPoints, borderColor: '#2563eb', fill: false }]
                }
            });
        }
    </script>
</body>
</html>
